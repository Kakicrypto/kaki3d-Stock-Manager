<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaki3D - Scanner NFC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1e2a38, #2e3f52);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 2px dashed #4CAF50;
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            max-width: 380px;
            width: 90%;
        }

        .icon { font-size: 64px; margin-bottom: 12px; }

        h1 {
            font-size: 24px;
            color: #4CAF50;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 28px;
        }

        #scan-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 16px 36px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        #scan-btn:disabled {
            background: #888;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            min-height: 24px;
        }

        #result {
            display: none;
            margin-top: 20px;
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid #4CAF50;
            border-radius: 10px;
            padding: 16px;
        }

        #result p { font-size: 13px; color: #aaa; margin-bottom: 4px; }
        #nfc-uid { font-size: 20px; font-weight: bold; color: #4CAF50; font-family: monospace; }

        #error {
            display: none;
            margin-top: 20px;
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid #f44336;
            border-radius: 10px;
            padding: 16px;
            color: #ff7961;
            font-size: 14px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 24px;
            color: #aaa;
            font-size: 13px;
            text-decoration: none;
            border-bottom: 1px solid #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Scanner un Tag NFC</h1>
        <p class="subtitle">Appuie sur le bouton puis approche ton tag</p>

        <button id="scan-btn">🔍 Démarrer le scan</button>

        <div id="status">En attente...</div>

        <div id="result">
            <p>UID détecté :</p>
            <div id="nfc-uid"></div>
        </div>

        <div id="error"></div>

        <br>
        <a class="back-btn" id="back-btn">← Retour à l'appli</a>
    </div>

    <script>
        // Récupère l'URL de retour depuis les paramètres
        const urlParams = new URLSearchParams(window.location.search);
        const returnUrl = urlParams.get('return') || '/';

        // Configure le bouton retour
        document.getElementById('back-btn').href = returnUrl;

        const scanBtn = document.getElementById('scan-btn');
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');
        const errorEl = document.getElementById('error');
        const uidEl = document.getElementById('nfc-uid');

        // Vérifie la compatibilité
        if (!('NDEFReader' in window)) {
            errorEl.style.display = 'block';
            errorEl.innerHTML = '❌ Web NFC non supporté.<br><small>Utilise Chrome sur Android.</small>';
            scanBtn.disabled = true;
        }

        scanBtn.addEventListener('click', async () => {
            errorEl.style.display = 'none';
            resultEl.style.display = 'none';
            scanBtn.disabled = true;
            statusEl.textContent = '📡 En attente du tag NFC...';
            statusEl.style.color = '#FFD700';

            try {
                const ndef = new NDEFReader();
                await ndef.scan();

                statusEl.textContent = '✅ Scan actif — approche ton tag !';
                statusEl.style.color = '#4CAF50';

                ndef.addEventListener('reading', ({ serialNumber }) => {
                    const uid = serialNumber.toUpperCase();

                    // Affiche l'UID
                    uidEl.textContent = uid;
                    resultEl.style.display = 'block';
                    statusEl.textContent = '✅ Tag scanné !';

                    // Redirige vers Streamlit avec l'UID
                    setTimeout(() => {
                        window.location.href = returnUrl + '?nfc_uid=' + encodeURIComponent(uid);
                    }, 1000);
                });

                ndef.addEventListener('readingerror', () => {
                    errorEl.style.display = 'block';
                    errorEl.textContent = '⚠️ Erreur de lecture. Réessaie.';
                    scanBtn.disabled = false;
                });

            } catch (error) {
                errorEl.style.display = 'block';
                if (error.name === 'NotAllowedError') {
                    errorEl.innerHTML = '🔒 Permission NFC refusée.<br><small>Autorise le NFC dans les paramètres du site.</small>';
                } else {
                    errorEl.innerHTML = '❌ ' + error.name + ' : ' + error.message;
                }
                scanBtn.disabled = false;
                statusEl.textContent = 'En attente...';
                statusEl.style.color = '#aaa';
            }
        });
    </script>
</body>
</html>
